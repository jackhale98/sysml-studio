name: Build Android App

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: Android (arm64)

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Android project
        run: npx tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Build frontend
        run: npm run build

      - name: Build Android APK (release, arm64 only)
        run: npx tauri android build --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Prepare APK for release
        id: apk
        run: |
          # Find the release APK (prefer release, fall back to debug)
          APK=$(find src-tauri/gen/android -path "*/release/*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            APK=$(find src-tauri/gen/android -name "*.apk" -type f | head -1)
          fi
          if [ -n "$APK" ]; then
            SIZE=$(du -h "$APK" | cut -f1)
            echo "Found APK: $APK ($SIZE)"
            cp "$APK" sysml-studio-android-arm64.apk
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "No APK found"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: sysml-studio-android-arm64.apk
          retention-days: 14

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.apk.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: sysml-studio-android-arm64.apk
