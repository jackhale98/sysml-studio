name: Build iOS App

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest
    name: iOS (aarch64)

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm run tauri -- --version || npx @tauri-apps/cli --version

      - name: Initialize iOS project (if needed)
        run: |
          if [ ! -d "src-tauri/gen/apple" ]; then
            npx tauri ios init
          fi

      - name: Build frontend
        run: npm run build

      - name: Build iOS (debug, no signing)
        run: npx tauri ios build --debug
        env:
          # For CI builds without signing, we build debug only
          # For production releases, configure signing in GitHub Secrets:
          #   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
          #   APPLE_SIGNING_IDENTITY, APPLE_PROVISIONING_PROFILE
          TAURI_APPLE_DEVELOPMENT_TEAM: ""

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug
          path: |
            src-tauri/gen/apple/build/**/*.app
            src-tauri/gen/apple/build/**/*.ipa
          retention-days: 14
