name: Build iOS App

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Always runs — validates the build compiles for iOS simulator
  build-simulator:
    runs-on: macos-15
    name: iOS Simulator (debug)

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize iOS project
        run: npx tauri ios init

      - name: Build frontend
        run: npm run build

      - name: Build iOS (simulator, no signing)
        run: |
          cd src-tauri/gen/apple
          xcodebuild \
            -scheme "sysml-studio_iOS" \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tail -50

      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-simulator-debug
          path: src-tauri/gen/apple/build/
          retention-days: 14

  # Runs on tags or manual dispatch when signing secrets are configured
  build-release:
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    name: iOS Release → TestFlight
    environment: ios-release

    steps:
      - name: Check for signing secrets
        env:
          HAS_CERT: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -z "$HAS_CERT" ]; then
            echo "::error::Apple signing secrets not configured — cannot build iOS release"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize iOS project
        run: npx tauri ios init

      # Patch Xcode project with signing settings before building
      - name: Configure code signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PBXPROJ="src-tauri/gen/apple/sysml-studio.xcodeproj/project.pbxproj"
          # Set development team on all empty DEVELOPMENT_TEAM entries
          sed -i '' "s/DEVELOPMENT_TEAM = \"\"/DEVELOPMENT_TEAM = \"$APPLE_TEAM_ID\"/g" "$PBXPROJ"
          # If no DEVELOPMENT_TEAM entries exist, add to all buildSettings blocks
          if ! grep -q "DEVELOPMENT_TEAM = \"$APPLE_TEAM_ID\"" "$PBXPROJ"; then
            sed -i '' "/buildSettings = {/a\\
\\t\\t\\t\\tDEVELOPMENT_TEAM = \"$APPLE_TEAM_ID\";" "$PBXPROJ"
          fi
          echo "Patched DEVELOPMENT_TEAM in Xcode project"

      # Install the Apple certificate and provisioning profile
      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        id: profile
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$APPLE_PROVISIONING_PROFILE" | base64 --decode -o $PP_PATH

          # Extract the UUID so Xcode can locate the profile
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
            "$(/usr/bin/security cms -D -i $PP_PATH)")
          echo "uuid=$PP_UUID" >> $GITHUB_OUTPUT

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision

      # Build with Tauri CLI — handles Rust compilation, frontend bundling,
      # and xcodebuild archive/export in one step
      - name: Build iOS release
        run: npx tauri ios build --export-method app-store-connect

      - name: Create ExportOptions and export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PP_UUID: ${{ steps.profile.outputs.uuid }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.sysmlstudio.studio</key>
              <string>${PP_UUID}</string>
            </dict>
          </dict>
          </plist>
          EOF

          # Find the archive produced by tauri ios build
          ARCHIVE=$(find ~/Library/Developer/Xcode/Archives src-tauri/gen/apple -name "*.xcarchive" 2>/dev/null | head -1)

          if [ -z "$ARCHIVE" ]; then
            # tauri ios build may output IPA directly
            FOUND_IPA=$(find src-tauri/gen/apple -name "*.ipa" | head -1)
            if [ -n "$FOUND_IPA" ]; then
              mkdir -p $RUNNER_TEMP/export
              cp "$FOUND_IPA" $RUNNER_TEMP/export/sysml-studio-ios.ipa
              echo "Found IPA directly at $FOUND_IPA"
              exit 0
            fi
            echo "::error::No archive or IPA found after build"
            exit 1
          fi

          echo "Exporting IPA from $ARCHIVE"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE" \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

          IPA=$(find $RUNNER_TEMP/export -name "*.ipa" | head -1)
          if [ -n "$IPA" ]; then
            cp "$IPA" $RUNNER_TEMP/export/sysml-studio-ios.ipa
          else
            echo "::error::Export produced no IPA"
            exit 1
          fi

      # Upload to TestFlight via App Store Connect API
      - name: Upload to TestFlight
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "::warning::App Store Connect API key not configured — skipping TestFlight upload"
            echo "Download the .ipa from the artifacts and upload manually via Transporter"
            exit 0
          fi

          # Write the API key to the expected location
          mkdir -p ~/.private_keys
          echo -n "$API_KEY" | base64 --decode > ~/.private_keys/AuthKey_${API_KEY_ID}.p8

          IPA_PATH=$RUNNER_TEMP/export/sysml-studio-ios.ipa

          echo "Uploading to App Store Connect / TestFlight..."
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            --type ios \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

          echo "Upload complete — build will appear in TestFlight after Apple processing (15-30 min)"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 90

      - name: Upload IPA to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ runner.temp }}/export/sysml-studio-ios.ipa

      # Clean up keychain
      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
