name: Build iOS App

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-simulator:
    runs-on: macos-15
    name: iOS Simulator (debug)

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize iOS project
        run: npx tauri ios init

      - name: Build frontend
        run: npm run build

      - name: Build iOS (simulator, no signing)
        run: |
          cd src-tauri/gen/apple
          xcodebuild \
            -scheme "sysml-studio_iOS" \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tail -50

      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-simulator-debug
          path: src-tauri/gen/apple/build/
          retention-days: 14

  build-release:
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    name: iOS Release
    environment: ios-release

    steps:
      - name: Check for signing secrets
        env:
          HAS_CERT: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -z "$HAS_CERT" ]; then
            echo "::error::Apple signing secrets not configured"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize iOS project
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: npx tauri ios init

      - name: Prepare App Store Connect API key
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          if [ -n "$API_KEY" ]; then
            mkdir -p ~/.private_keys
            echo -n "$API_KEY" | base64 --decode > ~/.private_keys/AuthKey_${API_KEY_ID}.p8
            echo "API_KEY_PATH=$HOME/.private_keys/AuthKey_${API_KEY_ID}.p8" >> $GITHUB_ENV
          fi

      - name: Build iOS release
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          IOS_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ env.API_KEY_PATH }}
        run: npx tauri ios build --export-method app-store-connect

      - name: Find IPA
        id: find-ipa
        run: |
          echo "Searching for IPA..."
          find src-tauri/gen/apple ~/Library/Developer/Xcode -name "*.ipa" 2>/dev/null || true

          FOUND_IPA=$(find src-tauri/gen/apple ~/Library/Developer/Xcode -name "*.ipa" 2>/dev/null | head -1)
          if [ -n "$FOUND_IPA" ]; then
            mkdir -p $RUNNER_TEMP/export
            cp "$FOUND_IPA" $RUNNER_TEMP/export/sysml-studio-ios.ipa
            echo "ipa_path=$RUNNER_TEMP/export/sysml-studio-ios.ipa" >> $GITHUB_OUTPUT
            echo "Found IPA: $FOUND_IPA"
          else
            echo "::error::No IPA found after build"
            exit 1
          fi

      - name: Upload to TestFlight
        if: env.API_KEY_PATH != ''
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          echo "Uploading to TestFlight..."
          xcrun altool --upload-app \
            -f ${{ steps.find-ipa.outputs.ipa_path }} \
            --type ios \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

          echo "Upload complete -- build appears in TestFlight after 15-30 min"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: ${{ steps.find-ipa.outputs.ipa_path }}
          retention-days: 90

      - name: Upload IPA to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ steps.find-ipa.outputs.ipa_path }}
