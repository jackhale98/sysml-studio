name: Build iOS App

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-14
    name: iOS (aarch64)

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize iOS project
        run: npx tauri ios init

      - name: Build frontend
        run: npm run build

      - name: Build iOS (simulator, no signing)
        run: |
          cd src-tauri/gen/apple
          xcodebuild \
            -project "sysml-studio.xcodeproj" \
            -scheme "sysml-studio_iOS" \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-simulator-debug
          path: src-tauri/gen/apple/build/
          retention-days: 14
